# ═══════════════════════════════════════════════════════════════
#  Nginx — Reverse Proxy для Cloud.ru VM
#  Версия: HTTP-only (SSL включается отдельно на Этапе 5)
#  ВАЖНО: Self-contained, никаких внешних include!
# ═══════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1M;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ── Rate Limiting ────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=orders:10m rate=10r/m;

    # ── Upstream (API) ───────────────────────────────────────────
    upstream api_backend {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ═══════════════════════════════════════════════════════════════
    #  HTTP Server (port 80)
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        # Proxy params (INLINE — no external file)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Static Files (Mini App) ────────────────────────────────
        location / {
            root /var/www/public;
            try_files $uri $uri/ /index.html;
            limit_req zone=api burst=20 nodelay;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── API Proxy ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://api_backend;
        }

        # ── Webhook (no rate limit) ────────────────────────────────
        location /api/payments/webhook {
            proxy_pass http://api_backend;
        }

        # ── Health Check ───────────────────────────────────────────
        location /api/health {
            proxy_pass http://api_backend;
            access_log off;
        }
    }
}

# ═══════════════════════════════════════════════════════════════
#  Чтобы включить HTTPS (после получения сертификата):
#  1. Раскомментируйте блок ниже
#  2. Замените пути к сертификатам
#  3. Перезапустите: docker compose restart nginx
# ═══════════════════════════════════════════════════════════════
